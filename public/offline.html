<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />

    <title>Mất kết nối — ShufaBook</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;

        background: #ece8e4;
        color: #1f2937;
        text-align: center;
        padding: 24px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #f26430;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 40px;
        font-weight: 800;
      }
      h1 {
        font-size: 18px;
        margin: 8px 0 0;
      }
      p {
        margin: 0;
        color: #6b7280;
        font-size: 14px;
        max-width: 280px;
      }
      button {
        margin-top: 8px;
        height: 44px;
        padding: 0 24px;
        border: none;
        border-radius: 999px;
        background: #1f2937;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
      }

  <body>
    <div class="icon">S</div>
    <h1>Mất kết nối mạng</h1>
    <p>Vui lòng kiểm tra kết nối Internet rồi thử lại.</p>
    <button onclick="location.reload()">Thử lại</button>
